<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SINUCA DE BAR ULTRA</title>

<style>

body{
margin:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0d0d0d;
z-index:10;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
cursor:pointer;
}

canvas{
display:none;
margin:auto;
background:#0b6623;
border:40px solid #5a3a1b;
border-radius:20px;
}

#hud{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:20px;
}

#bar{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#2b1b0f;
display:flex;
justify-content:space-around;
align-items:center;
font-size:18px;
}

</style>
</head>
<body>

<div id="menu">

<h1>🎱 SINUCA DE BAR ULTRA</h1>

<button onclick="startGame('cpu')">🤖 Jogar contra máquina</button>
<button onclick="startGame('pvp')">👥 1x1</button>

</div>

<div id="hud">Turno: Jogador 1</div>

<canvas id="game" width="900" height="500"></canvas>

<div id="bar">
👴 Tiozão de Boné 🍺  
🚬 Zé fumando Derby
</div>

<audio id="tacada" src="https://cdn.pixabay.com/audio/2022/03/15/audio_9a0d1db33b.mp3"></audio>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let balls=[]
let aiming=false
let aimX=0
let aimY=0
let currentPlayer=1
let gameMode="pvp"

let pockets=[
{x:0,y:0},
{x:450,y:0},
{x:900,y:0},
{x:0,y:500},
{x:450,y:500},
{x:900,y:500}
]

function startGame(mode){

gameMode=mode

document.getElementById("menu").style.display="none"
canvas.style.display="block"

initBalls()
loop()

}

function initBalls(){

balls=[]

balls.push({x:200,y:250,vx:0,vy:0,color:"white",cue:true})

let colors=["yellow","blue","red","purple","orange","green","brown"]

for(let i=0;i<7;i++){

balls.push({
x:650+(i*14),
y:250+(i%2*18),
vx:0,
vy:0,
color:colors[i]
})

}

}

function moving(){

return balls.some(b=>Math.abs(b.vx)>0.1 || Math.abs(b.vy)>0.1)

}

canvas.addEventListener("mousedown",e=>{

if(moving())return

aiming=true

})

canvas.addEventListener("mouseup",e=>{

if(!aiming)return

aiming=false

let rect=canvas.getBoundingClientRect()

let mx=e.clientX-rect.left
let my=e.clientY-rect.top

let cue=balls[0]

cue.vx=(cue.x-mx)/14
cue.vy=(cue.y-my)/14

document.getElementById("tacada").play()

})

canvas.addEventListener("mousemove",e=>{

let rect=canvas.getBoundingClientRect()

aimX=e.clientX-rect.left
aimY=e.clientY-rect.top

})

canvas.addEventListener("touchmove",e=>{

let rect=canvas.getBoundingClientRect()

aimX=e.touches[0].clientX-rect.left
aimY=e.touches[0].clientY-rect.top

})

function update(){

balls.forEach(b=>{

b.x+=b.vx
b.y+=b.vy

b.vx*=0.985
b.vy*=0.985

if(b.x<15||b.x>885)b.vx*=-1
if(b.y<15||b.y>485)b.vy*=-1

})

collision()
pocketsCheck()

}

function collision(){

for(let i=0;i<balls.length;i++){

for(let j=i+1;j<balls.length;j++){

let a=balls[i]
let b=balls[j]

let dx=b.x-a.x
let dy=b.y-a.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<16){

let angle=Math.atan2(dy,dx)

let force=1.2

a.vx-=Math.cos(angle)*force
a.vy-=Math.sin(angle)*force

b.vx+=Math.cos(angle)*force
b.vy+=Math.sin(angle)*force

}

}

}

}

function pocketsCheck(){

balls.forEach((b,i)=>{

pockets.forEach(p=>{

let dx=b.x-p.x
let dy=b.y-p.y

if(Math.sqrt(dx*dx+dy*dy)<20){

if(!b.cue){

balls.splice(i,1)

}

}

})

})

}

function cpu(){

if(gameMode!="cpu")return
if(currentPlayer!=2)return
if(moving())return

let cue=balls[0]
let target=balls[1]

if(!target)return

let dx=cue.x-target.x
let dy=cue.y-target.y

cue.vx=dx/12
cue.vy=dy/12

currentPlayer=1

}

function drawTable(){

ctx.fillStyle="#0b6623"
ctx.fillRect(0,0,900,500)

ctx.fillStyle="black"

pockets.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,20,0,Math.PI*2)
ctx.fill()

})

}

function drawBalls(){

balls.forEach(b=>{

ctx.beginPath()
ctx.arc(b.x,b.y,8,0,Math.PI*2)
ctx.fillStyle=b.color
ctx.fill()

})

}

function drawCue(){

if(!aiming)return

let cue=balls[0]

let dx=aimX-cue.x
let dy=aimY-cue.y

let angle=Math.atan2(dy,dx)

ctx.save()

ctx.translate(cue.x,cue.y)
ctx.rotate(angle)

ctx.fillStyle="#c69c6d"
ctx.fillRect(-150,-2,150,4)

ctx.fillStyle="#3a6ea5"
ctx.fillRect(-155,-2,5,4)

ctx.restore()

}

function drawBarPeople(){

ctx.fillStyle="white"
ctx.font="18px Arial"

ctx.fillText("👴 Tiozão bebendo cerveja",40,480)
ctx.fillText("🚬 Zé fumando Derby",650,480)

}

function loop(){

update()

drawTable()
drawBalls()
drawCue()
drawBarPeople()

cpu()

requestAnimationFrame(loop)

}

</script>
</body>
</html>
