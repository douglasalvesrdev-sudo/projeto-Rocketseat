<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BUSHIDO: SHADOW KENSEI</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --boss-red: #ff0033;
            --stagger: #ffcc00;
        }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #wrapper { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* HUD DO BOSS REFINADA */
        #boss-hud {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 700px; display: none; z-index: 100;
        }
        .boss-name { color: #fff; font-size: 12px; letter-spacing: 5px; text-align: center; margin-bottom: 5px; text-shadow: 0 0 10px var(--boss-red); }
        .bar-bg { width: 100%; height: 10px; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,255,255,0.2); position: relative; }
        #boss-hp-fill { width: 100%; height: 100%; background: var(--boss-red); transition: 0.1s; box-shadow: 0 0 15px var(--boss-red); }
        #boss-posture-fill { position: absolute; top: -5px; left: 0; width: 0%; height: 3px; background: var(--stagger); transition: 0.2s; }

        #player-hud { position: absolute; top: 30px; left: 30px; color: #fff; z-index: 100; }
        .p-bar { width: 200px; height: 6px; background: #111; border: 1px solid #333; margin: 5px 0; }
        #p-hp { width: 100%; height: 100%; background: var(--neon-blue); }

        canvas { background: #050508; image-rendering: pixelated; }
        #menu { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        .btn { background: none; border: 1px solid var(--boss-red); color: #fff; padding: 20px 60px; cursor: pointer; letter-spacing: 5px; transition: 0.4s; }
    </style>
</head>
<body>

<div id="wrapper">
    <div id="player-hud">
        <div style="font-size: 10px;">SAMURAI_CORE</div>
        <div class="p-bar"><div id="p-hp"></div></div>
    </div>

    <div id="boss-hud">
        <div class="boss-name">KAGE NO KENSEI - SANTO DA ESPADA</div>
        <div class="bar-bg">
            <div id="boss-posture-fill"></div>
            <div id="boss-hp-fill"></div>
        </div>
    </div>

    <div id="menu">
        <h1 style="color:white; letter-spacing: 15px; text-align: center;">KAGE NO KENSEI<br><span style="font-size: 0.8rem; color: var(--boss-red);">DUELO FINAL</span></h1>
        <button class="btn" onclick="start()">DESAFIAR</button>
    </div>

    <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1000; canvas.height = 500;

let active = false;
let frame = 0;
let camX = 0;
let shake = 0;
let timeScale = 1;

const player = { x: 100, y: 350, w: 40, h: 60, vx: 0, vy: 0, hp: 100, dir: 1, attack: false, grounded: true, parry: false };

// BOSS LOGIC DATA
const boss = {
    x: 700, y: 300, w: 50, h: 100, hp: 1000, maxHp: 1000,
    posture: 0, maxPosture: 100,
    state: 'idle', // idle, dash, attack, stagger, enraged
    timer: 0, dir: -1, 
    afterImages: [], 
    phase: 1, 
    isAttacking: false,
    swordRange: 120
};

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

function drawBoss() {
    // 1. After-images (Sombras Residuais)
    boss.afterImages.forEach((img, i) => {
        ctx.globalAlpha = 0.1 * (i / boss.afterImages.length);
        ctx.fillStyle = 'purple';
        ctx.fillRect(img.x - camX, img.y, boss.w, boss.h);
    });
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(boss.x - camX + (boss.dir === -1 ? boss.w : 0), boss.y);
    ctx.scale(boss.dir, 1);

    // Corpo (Silhueta esguia)
    ctx.shadowBlur = boss.state === 'enraged' ? 25 : 10;
    ctx.shadowColor = 'red';
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(10, 10, 30, 90); // Tronco
    
    // Cabeça
    ctx.fillStyle = '#111';
    ctx.fillRect(15, 0, 20, 20);
    
    // NODACHI (Brilho de rastro)
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    if(boss.state === 'idle') {
        // Posição de Saque (Bainha)
        ctx.beginPath(); ctx.moveTo(10, 60); ctx.lineTo(-10, 90); ctx.stroke();
    } else if (boss.isAttacking) {
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(30, 50, boss.swordRange, -0.5, 0.5); ctx.stroke();
        // Efeito de vácuo (Enraged)
        if(boss.phase === 2) {
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.strokeRect(40, 0, 200, 100);
        }
    }

    // Sinal de Iaijutsu (Brilho no punho)
    if(boss.state === 'dash' && boss.timer > 20) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(10, 60, 5 + Math.sin(frame*0.5)*3, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
}

function updateBoss() {
    if(!active) return;
    boss.timer++;

    // Transição de Fase
    if(boss.hp < boss.maxHp * 0.5 && boss.phase === 1) {
        boss.phase = 2;
        boss.swordRange = 220; // Quebra a bainha, aumenta alcance
        shake = 30;
    }

    // Gerar After-images se estiver movendo rápido
    if(boss.state === 'dash') {
        boss.afterImages.push({x: boss.x, y: boss.y});
        if(boss.afterImages.length > 10) boss.afterImages.shift();
    } else {
        if(boss.afterImages.length > 0) boss.afterImages.shift();
    }

    // State Machine
    switch(boss.state) {
        case 'idle':
            boss.isAttacking = false;
            if(boss.timer > 40) {
                boss.state = 'dash';
                boss.timer = 0;
            }
            break;

        case 'dash':
            // Ziguezague
            boss.x += (player.x > boss.x ? 8 : -8) * (boss.phase === 2 ? 1.25 : 1);
            boss.y = 300 + Math.sin(frame * 0.2) * 20;
            if(boss.timer > 50) {
                boss.state = 'attack';
                boss.timer = 0;
            }
            break;

        case 'attack':
            boss.isAttacking = true;
            // Hitbox check
            let dist = Math.abs(player.x - boss.x);
            if(boss.timer === 10 && dist < boss.swordRange) {
                if(player.parry) {
                    boss.posture += 34; // 3 parries causam stagger
                    shake = 5;
                    boss.state = 'idle';
                } else {
                    player.hp -= 20;
                    shake = 20;
                }
            }
            if(boss.timer > 30) { boss.state = 'idle'; boss.timer = 0; }
            break;

        case 'stagger':
            boss.isAttacking = false;
            boss.y = 320; // Abaixa a silhueta
            if(boss.timer > 100) {
                boss.posture = 0;
                boss.state = 'idle';
                boss.timer = 0;
            }
            break;
    }

    if(boss.posture >= boss.maxPosture) {
        boss.state = 'stagger';
        boss.timer = 0;
        boss.posture = 0;
    }

    // Update HUD
    document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';
    document.getElementById('boss-posture-fill').style.width = boss.posture + '%';
}

function updatePlayer() {
    if(keys['ArrowRight']) { player.vx = 6; player.dir = 1; }
    else if(keys['ArrowLeft']) { player.vx = -6; player.dir = -1; }
    else player.vx *= 0.8;

    player.x += player.vx;
    
    // Parry Mechanism
    player.parry = keys['KeyC'];

    // Attack
    if(keys['KeyX'] && !player.attack) {
        player.attack = true;
        let dist = Math.abs(player.x - boss.x);
        if(dist < 100) {
            // Freeze Frame (Juice)
            if(boss.state !== 'stagger') {
                boss.hp -= 10;
            } else {
                boss.hp -= 50; // Dano massivo no stagger
            }
            timeScale = 0.1;
            setTimeout(() => timeScale = 1, 50);
        }
        setTimeout(() => player.attack = false, 200);
    }
}

function loop() {
    if(!active) return;
    frame++;

    updatePlayer();
    updateBoss();

    // Render
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Arena Floor
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 400, canvas.width, 100);
    ctx.strokeStyle = '#333';
    ctx.strokeRect(0, 400, canvas.width, 2);

    ctx.save();
    if(shake > 0) { ctx.translate(Math.random()*shake, Math.random()*shake); shake *= 0.9; }
    
    // Draw Player
    ctx.fillStyle = player.parry ? varColor('--neon-blue') : '#fff';
    ctx.fillRect(player.x - camX, player.y, player.w, player.h);
    if(player.attack) {
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(player.x - camX + (player.dir*40), player.y, 60, 20);
    }

    drawBoss();
    ctx.restore();

    document.getElementById('p-hp').style.width = player.hp + '%';
    if(player.hp <= 0) location.reload();
    if(boss.hp <= 0) { alert("O SANTO DA ESPADA CAIU."); location.reload(); }

    requestAnimationFrame(loop);
}

function start() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('boss-hud').style.display = 'block';
    active = true;
    loop();
}

function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
</script>
</body>
</html>
