<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cyber Katana - Dead Cells Style</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #330066; box-shadow: 0 0 20px #ff00ff; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    pixelArt: true,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1000 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, cursors, slashKey, dashKey, platforms, enemies, bloodParticles;
let isAttacking = false;
let canDash = true;

function preload() {
    // Assets procedurais (substituindo arquivos externos por formas geométricas para garantir que funcione agora)
    // No seu projeto real, você trocaria por spritesheets de samurai e árvores.
}

function create() {
    // 🌳 CENÁRIO (MAPA COM ÁRVORES E NEON)
    this.add.rectangle(400, 225, 800, 450, 0x0d0221); // Fundo escuro
    
    // Árvores Estilizadas (Simbolizando o cenário RPG)
    for(let i=0; i<5; i++) {
        let tx = i * 200;
        this.add.rectangle(tx, 350, 20, 100, 0x4b2d1f); // Tronco
        this.add.circle(tx, 300, 40, 0x00ff88, 0.3);    // Folhagem Neon
    }

    platforms = this.physics.add.staticGroup();
    platforms.create(400, 430, null).setAlpha(0).setSize(800, 40).setDisplaySize(800, 40); // Chão invisível
    platforms.create(600, 300, null).setAlpha(0).setSize(200, 20).setDisplaySize(200, 20); // Plataforma

    // 🩸 SISTEMA DE SANGUE (PARTÍCULAS)
    bloodParticles = this.add.particles(0, 0, 'blood', {
        color: [ 0xff0000, 0x880000 ],
        speed: { min: -150, max: 150 },
        scale: { start: 0.1, end: 0 },
        lifespan: 400,
        emitting: false
    });

    // 🎌 O SAMURAI (PLAYER)
    player = this.physics.add.sprite(100, 300, null);
    player.setSize(30, 50);
    player.setOrigin(0.5, 1);
    player.body.setCollideWorldBounds(true);
    
    // Desenho visual do Samurai
    const graphics = this.make.graphics({ x: 0, y: 0, add: false });
    graphics.fillStyle(0x00ffff); graphics.fillRect(0, 0, 30, 50); // Corpo Ciano
    graphics.fillStyle(0xffffff); graphics.fillRect(10, 5, 20, 5); // Visor
    player.setTexture(graphics.generateTexture('samurai', 30, 50));

    // 👹 CHEFE (BOSS)
    enemies = this.physics.add.group();
    let boss = enemies.create(600, 350, null);
    boss.setTint(0xff0055);
    boss.health = 5;
    boss.setSize(50, 80);
    const bossGraph = this.make.graphics({x:0, y:0, add:false});
    bossGraph.fillStyle(0xff0055); bossGraph.fillRect(0,0,50,80);
    boss.setTexture(bossGraph.generateTexture('boss', 50, 80));

    // INPUTS
    cursors = this.input.keyboard.createCursorKeys();
    slashKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
    dashKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C);

    // COLISÕES
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(enemies, platforms);
    this.physics.add.overlap(player, enemies, handleCombat, null, this);
}

function update() {
    if (isAttacking) return;

    // Movimento Lateral
    if (cursors.left.isDown) {
        player.setVelocityX(-250);
        player.setFlipX(true);
    } else if (cursors.right.isDown) {
        player.setVelocityX(250);
        player.setFlipX(false);
    } else {
        player.setVelocityX(0);
    }

    // Pulo (Estilo Dead Cells)
    if (cursors.up.isDown && player.body.touching.down) {
        player.setVelocityY(-550);
    }

    // DASH (C)
    if (Phaser.Input.Keyboard.JustDown(dashKey) && canDash) {
        performDash(this);
    }

    // ATAQUE (X)
    if (Phaser.Input.Keyboard.JustDown(slashKey)) {
        attack(this);
    }
}

function attack(scene) {
    isAttacking = true;
    player.setTint(0xff00ff); // Feedback visual do corte
    
    // Simulação de som (Beep curto)
    const osc = new AudioContext().createOscillator();
    const g = new AudioContext().createGain();
    osc.connect(g); g.connect(new AudioContext().destination);
    osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, new AudioContext().currentTime + 0.1);

    scene.time.delayedCall(200, () => {
        isAttacking = false;
        player.clearTint();
    });
}

function performDash(scene) {
    canDash = false;
    const dir = player.flipX ? -1 : 1;
    player.setVelocityX(dir * 1200);
    player.body.allowGravity = false;
    
    scene.time.delayedCall(150, () => {
        player.body.allowGravity = true;
        scene.time.delayedCall(500, () => { canDash = true; });
    });
}

function handleCombat(p, enemy) {
    if (isAttacking) {
        // Efeito de Sangue
        bloodParticles.emitParticleAt(enemy.x, enemy.y, 10);
        
        // Empurrão (Knockback)
        enemy.x += p.flipX ? -20 : 20;
        enemy.setTint(0xffffff);
        setTimeout(() => enemy.setTint(0xff0055), 100);

        enemy.health -= 1;
        if(enemy.health <= 0) enemy.destroy();
    }
}
</script>
</body>
</html>
